<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CareerPrep</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS -->

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- ================= HEADER ================= -->

    <header class="navbar">

        <div class="logo-section">

            <img src="assets/logo.png" alt="CareerPrep Logo" height="200px">

            <div>

                <h1>CareerPrep</h1>

                <p>
                    AI Interview Preparation Assistant
                </p>

            </div>

        </div>

    </header>

    <!-- ================= MAIN ================= -->

    <main class="container">

        <!-- ================= Upload Section ================= -->

        <section class="upload-card">

            <h2>Candidate Profile</h2>

            <p>
                Upload your Resume and Job Description to generate
                an AI-powered candidate profile.
            </p>

            <div class="upload-grid">

                <div class="upload-box">

                    <label for="resume">

                        <i class="fa-solid fa-file-arrow-up"></i>

                        <span>Upload Resume (PDF)</span>

                    </label>

                    <input
                        type="file"
                        id="resume"
                        accept=".pdf">

                </div>

                <div class="upload-box">

                    <label for="jobDescription">

                        <i class="fa-solid fa-file-arrow-up"></i>

                        <span>Upload Job Description (PDF)</span>

                    </label>

                    <input
                        type="file"
                        id="jobDescription"
                        accept=".pdf">

                </div>

            </div>

        </section>

        <!-- ================= Additional Information ================= -->

        <section class="form-card">

            <h2>Additional Information</h2>

            <div class="form-grid">

                <!-- LEFT -->

                <div class="form-column">

                    <div class="input-group">

                        <label>GitHub Profile</label>

                        <input
                            type="text"
                            id="github"
                            placeholder="https://github.com/username">

                    </div>

                    <div class="input-group">

                        <label>Communication Skill</label>

                        <input
                            type="range"
                            id="communication"
                            min="1"
                            max="10"
                            value="5">

                        <span id="communicationValue">5</span>

                    </div>

                    <div class="input-group">

                        <label>Coding Skill</label>

                        <input
                            type="range"
                            id="coding"
                            min="1"
                            max="10"
                            value="5">

                        <span id="codingValue">5</span>

                    </div>

                    <div class="input-group">

                        <label>Aptitude Skill</label>

                        <input
                            type="range"
                            id="aptitude"
                            min="1"
                            max="10"
                            value="5">

                        <span id="aptitudeValue">5</span>

                    </div>

                </div>

                <!-- RIGHT -->

                <div class="form-column">

                    <div class="input-group">

                        <label>Soft Skills</label>

                        <input
                            type="range"
                            id="softSkills"
                            min="1"
                            max="10"
                            value="5">

                        <span id="softSkillsValue">5</span>

                    </div>

                    <div class="input-group">

                        <label>Backlogs</label>

                        <input
                            type="number"
                            id="backlogs"
                            value="0"
                            min="0">

                    </div>

                    <div class="input-group">

                        <label>College Tier</label>

                        <select id="collegeTier">

                            <option>Tier 1</option>
                            <option>Tier 2</option>
                            <option>Tier 3</option>

                        </select>

                    </div>

                    <div class="input-group">

                        <label>Placement Training</label>

                        <select id="placementTraining">

                            <option>Yes</option>
                            <option>No</option>

                        </select>

                    </div>

                </div>

            </div>

            <div class="button-container">

                <button
                    id="generateProfile"
                    type="button">

                    <i class="fa-solid fa-rocket"></i>

                    Generate Candidate Profile

                </button>

            </div>

        </section>

        <!-- ================= LOADER ================= -->

        <section
            class="loader-section"
            id="loaderSection">

            <div class="loader"></div>

            <p>

                Generating Candidate Profile...

            </p>

        </section>

        <!-- ================= RESULT ================= -->

        <section
            class="result-section"
            id="resultSection">

            <!-- Screening Confidence -->

            <div class="result-card">

                <h2>

                    Screening Confidence

                </h2>

                <div class="progress-container">

                    <div
                        class="progress-bar"
                        id="predictionBar">

                    </div>

                </div>

                <h3
                    id="predictionPercentage">

                    0%

                </h3>

                <div
                    id="predictionMessage"
                    class="status-card">

                </div>

            </div>

            <!-- Compatibility -->

            <div class="result-card">

                <h2>

                    Resume - JD Compatibility

                </h2>

                <div class="progress-container">

                    <div
                        class="progress-bar"
                        id="matchBar">

                    </div>

                </div>

                <h3
                    id="matchPercentage">

                    0%

                </h3>

                <div
                    id="matchMessage"
                    class="status-card">

                </div>

            </div>

            <div class="button-container">

                <button
                    id="roadmapBtn"
                    type="button">

                    <i class="fa-solid fa-map"></i>

                    Generate Personalized Roadmap

                </button>

                <button
                    id="preparationBtn"
                    type="button">
                    <i class="fa-solid fa-book-open"></i>

                    Interview Preparation

                </button>

            </div>

        </section>

    </main>

    <!-- JS -->

    <script src="js/config.js?v=3"></script>
    <script src="js/storage.js?v=2"></script>
    <script src="js/api.js?v=3"></script>
    <script src="js/home.js?v=3"></script>


</body>

</html>
