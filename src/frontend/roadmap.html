<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>CareerPrep | Learning Roadmap</title>

    <!-- Google Font -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS -->

    <link rel="stylesheet"
          href="css/global.css">

    <link rel="stylesheet"
          href="css/roadmap.css">

</head>

<body>

    <!-- =========================
            NAVBAR
    ========================== -->

    <header class="navbar">

        <div class="logo-section">

            <img src="assets/logo.png"
                 alt="Logo">

            <div>

                <h1>CareerPrep</h1>

                <p>
                    Personalized Learning Roadmap
                </p>

            </div>

        </div>

    </header>

    <!-- =========================
            MAIN
    ========================== -->

    <main class="container">

        <!-- Missing Skills -->

        <section class="roadmap-card">

            <h2>

                <i class="fa-solid fa-bullseye"></i>

                Missing Skills

            </h2>

            <div id="skillsContainer"
                 class="skills-container">

            </div>

        </section>

        <!-- Weekly Plan -->

        <section class="roadmap-card">

            <h2>

                <i class="fa-solid fa-calendar-days"></i>

                Weekly Learning Plan

            </h2>

            <div id="roadmapContainer">

            </div>

        </section>

        <!-- Buttons -->

        <section class="button-container">

            <button id="backButton">

                <i class="fa-solid fa-arrow-left"></i>

                Back

            </button>

            <button id="interviewButton">

                <i class="fa-solid fa-microphone"></i>

                Start Mock Interview

            </button>

        </section>

    </main>

    <!-- JS -->

    <script src="js/storage.js?v=2"></script>

    <script src="js/roadmap.js?v=3"></script>

</body>

</html>
